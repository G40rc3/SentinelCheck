# nginx-security.conf: Sentinel Check
# ─────────────────────────────────────────────────────────────
# Production Nginx config for sentinelcheck.co.uk (static site).
# Tested against Nginx 1.24+.
#
# OWASP references:
#   OWASP Secure Headers Project
#   OWASP Testing Guide WSTG-CONF-02, CONF-05, CONF-11
# ─────────────────────────────────────────────────────────────

# ── RATE LIMIT ZONES (must be in http block, not server block) ────────
# Paste these into your http { } block in /etc/nginx/nginx.conf:
#
#   limit_req_zone $binary_remote_addr zone=web:10m rate=60r/m;
#   limit_req_zone $binary_remote_addr zone=assets:10m rate=120r/m;
#   limit_conn_zone $binary_remote_addr zone=perip:10m;
#
# ─────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sentinelcheck.co.uk www.sentinelcheck.co.uk;

    root /var/www/sentinelcheck;
    index index.html;

    # ── TLS CONFIGURATION ─────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/sentinelcheck.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sentinelcheck.co.uk/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    # TLS 1.2 minimum: drops 1.0 and 1.1 (deprecated by RFC 8996)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # OCSP stapling: avoids per-request CA roundtrips, improves TLS handshake time.
    # resolver must point to a reachable DNS server (8.8.8.8 = Google, or use your
    # server's own resolver e.g. 127.0.0.1).
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Diffie-Hellman parameters (generate once: openssl dhparam -out /etc/nginx/dhparam.pem 2048)
    ssl_dhparam /etc/nginx/dhparam.pem;

    # ── SUPPRESS SERVER FINGERPRINT ───────────────────────────
    server_tokens off;
    # Requires nginx_headers_more module:
    # more_clear_headers Server;
    # more_clear_headers X-Powered-By;

    # ── SECURITY HEADERS ──────────────────────────────────────
    # CSP: strict allowlist: no unsafe-inline, no unsafe-eval, no wildcards.
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'none'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; object-src 'none'; upgrade-insecure-requests;" always;

    # HSTS: 2 years, subdomains, preload-eligible
    # Submit to https://hstspreload.org after confirming HTTPS works end-to-end
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), fullscreen=(self)" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # ── DISABLE DIRECTORY LISTING ─────────────────────────────
    autoindex off;

    # ── RESTRICT HTTP METHODS ─────────────────────────────────
    # Static site: GET and HEAD only
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # ── BLOCK SENSITIVE FILES ─────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* \.(env|log|bak|sql|conf|git|sh|py|rb|php)$ {
        deny all;
        return 404;
    }

    # ── RATE LIMITING ─────────────────────────────────────────
    # Zones defined in http block (see top of file)
    limit_req zone=web burst=20 nodelay;
    limit_conn perip 20;
    limit_req_status 429;
    limit_conn_status 429;

    # ── GZIP COMPRESSION ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/css
        text/plain
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml
        application/wasm;

    # ── BROTLI COMPRESSION ────────────────────────────────────
    # Requires nginx-brotli module (libbrotli). Install:
    #   apt install libnginx-mod-brotli  # Debian/Ubuntu
    # or compile from: https://github.com/google/ngx_brotli
    brotli on;
    brotli_comp_level 6;
    brotli_types
        text/html
        text/css
        text/plain
        application/javascript
        application/json
        image/svg+xml;


    # ── GHOST PROTOCOL TOOLKIT ──────────────────────────────
    # Self-contained interactive toolkit. Main site remains strict; this folder permits
    # the inline handlers/styles used by Ghost Protocol without broadening the rest.
    location ^~ /ghost-protocol/ {
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'none'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; object-src 'none'; upgrade-insecure-requests;" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), fullscreen=(self)" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /ghost-protocol/index.html;
    }

    # ── STATIC ASSETS: LONG CACHE + IMMUTABLE ────────────────
    # Files include content hash in name (via build tool); safe to cache forever.
    # "immutable" tells browsers not to revalidate even on hard refresh.
    location ~* \.(css|js|webp|png|ico|woff2|woff|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        # Re-add security headers lost when this location block runs
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── HTML: SHORT CACHE, REVALIDATE ───────────────────────
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── SITEMAP / ROBOTS: SHORT CACHE ───────────────────────
    location ~ ^/(sitemap\.xml|robots\.txt)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    # ── MAIN LOCATION ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── CUSTOM ERROR PAGES ────────────────────────────────────
    # Prevents stack trace / server version leaks in error responses
    error_page 404 /404.html;
    error_page 405 /405.html;
    error_page 429 /429.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { internal; }
}

# ── REDIRECT HTTP TO HTTPS ─────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name sentinelcheck.co.uk www.sentinelcheck.co.uk;

    # No content served over HTTP: immediate 301 permanent redirect
    return 301 https://sentinelcheck.co.uk$request_uri;
}

# ── REDIRECT WWW TO NON-WWW ────────────────────────────────
# Canonical is non-www per sitemap and canonical meta tag
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.sentinelcheck.co.uk;

    ssl_certificate     /etc/letsencrypt/live/sentinelcheck.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sentinelcheck.co.uk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://sentinelcheck.co.uk$request_uri;
}
