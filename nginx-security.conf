# nginx-security.conf
# ─────────────────────────────────────────────────────────────
# Nginx server block for Sentinel Check static site.
# Include this in your main nginx.conf or sites-available config.
#
# OWASP references:
# - OWASP Secure Headers Project
# - OWASP Testing Guide WSTG-CONF-02, CONF-05
# ─────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sentinelcheck.co.uk www.sentinelcheck.co.uk;

    root /var/www/sentinelcheck;
    index index.html;

    # ── TLS CONFIGURATION ─────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/sentinelcheck.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sentinelcheck.co.uk/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    # Modern TLS only — drops support for TLS 1.0 and 1.1
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── SUPPRESS SERVER FINGERPRINT ───────────────────────────
    server_tokens off;

    # ── REDIRECT HTTP TO HTTPS ────────────────────────────────
    # (handled in separate port 80 block below)

    # ── SECURITY HEADERS ──────────────────────────────────────
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'none'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; object-src 'none'; upgrade-insecure-requests;" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), interest-cohort=()" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Remove headers that leak server info
    more_clear_headers Server;
    more_clear_headers X-Powered-By;

    # ── DISABLE DIRECTORY LISTING ─────────────────────────────
    autoindex off;

    # ── BLOCK SENSITIVE FILES ────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* \.(env|log|bak|sql|conf|git|sh)$ {
        deny all;
        return 404;
    }

    # ── STATIC FILES — LONG CACHE ────────────────────────────
    location ~* \.(css|js|png|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # ── HTML — REVALIDATE ────────────────────────────────────
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # ── GZIP ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/xml text/plain;
    gzip_vary on;

    # ── RESTRICT HTTP METHODS ────────────────────────────────
    # Static site — only GET and HEAD needed
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # ── RATE LIMITING ────────────────────────────────────────
    # Define in http block: limit_req_zone $binary_remote_addr zone=web:10m rate=30r/m;
    limit_req zone=web burst=10 nodelay;

    # ── MAIN LOCATION ────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── CUSTOM ERROR PAGES ───────────────────────────────────
    # Generic errors — do not leak server/stack info
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { internal; }
}

# ── REDIRECT HTTP TO HTTPS ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name sentinelcheck.co.uk www.sentinelcheck.co.uk;
    return 301 https://sentinelcheck.co.uk$request_uri;
}
